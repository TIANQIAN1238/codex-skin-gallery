name: Discover new skins

on:
  schedule:
    - cron: '23 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Search GitHub for new skin projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/discover-skins.mjs
      - name: Save updated candidate queue
        run: |
          if git diff --quiet -- data/discovered-projects.json; then
            echo "No discovery changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/discovered-projects.json
          git commit -m "chore: refresh skin discovery queue"
          git push
